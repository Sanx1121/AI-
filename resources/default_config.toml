[app]
demo_mode = false
profile = "balanced"

[audio]
sample_rate = 16000
channels = 1
chunk_duration_sec = 2.0
feed_chunk_sec = 0.1
loopback_device = ""
silence_rms_threshold = 0.002

[asr]
engine = "whisper"
model_size = "tiny"
device = "auto"
compute_type = "default"
language = "en"
# Whisper 内置 Silero VAD：过滤静音/背景噪声，减少 hallucination
vad_filter = false
whisper_vad_threshold = 0.35
whisper_vad_min_silence_ms = 500
whisper_vad_speech_pad_ms = 200
normalize_audio = true

[utterance]
vad_frame_ms = 30
speech_pad_ms = 200
utterance_end_silence_ms = 400
max_utterance_sec = 15.0
max_phrase_sec = 0
ring_buffer_sec = 30.0
vad_threshold = 0.45
use_silero_vad = true
energy_threshold = 0.015
partial_interval_ms = 200
# partial 从话轮起点增长，上限 partial_window_sec（partial_tail_sec 已弃用）
partial_window_sec = 3.0
partial_tail_sec = 0.8
min_partial_sec = 0.25
ring_drop_sec = 1.0

[translation]
ollama_base_url = "http://localhost:11434"
model_name = "qwen2.5:7b"

[subtitle]
max_visible_lines = 4
history_max_lines = 2
font_size = 24
opacity = 0.85
position = "bottom"
final_color = "#FFFFFF"
partial_color = "#9EACB4"

log_level = "INFO"
